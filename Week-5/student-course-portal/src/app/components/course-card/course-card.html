<article class="course-card" [ngClass]="cardClasses" [ngStyle]="{ 'border-left-color': borderColour }">
  <h2>{{ course.name }}</h2>
  <p>{{ course.code }} · {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="pending">Pending</span>
  </div>

  <div *ngIf="isExpanded" class="course-details">
    <p>Course ID: {{ course.id }}</p>
    <p>Current status: {{ course.gradeStatus }}</p>
  </div>

  <button type="button" (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>
  <button type="button" (click)="enroll()" [disabled]="enrolled">
    {{ enrolled ? 'Enrolled' : 'Enroll' }}
  </button>
</article>
