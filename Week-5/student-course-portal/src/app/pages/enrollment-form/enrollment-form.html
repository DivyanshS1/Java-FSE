<h2>Course Enrollment Form</h2>

<form #enrollForm="ngForm"
      (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->

  <label>Name</label>

  <input
      type="text"
      name="studentName"
      required
      minlength="3"
      [(ngModel)]="studentName"
      #nameCtrl="ngModel">

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
      Name is required
  </span>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
  </span>

  <br><br>

  <!-- Email -->

  <label>Email</label>

  <input
      type="email"
      name="studentEmail"
      required
      email
      [(ngModel)]="studentEmail"
      #emailCtrl="ngModel">

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
      Email is required
  </span>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
      Invalid email
  </span>

  <br><br>

  <!-- Course ID -->

  <label>Course ID</label>

  <input
      type="number"
      name="courseId"
      required
      [(ngModel)]="courseId"
      #courseCtrl="ngModel">

  <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
      Course ID is required
  </span>

  <br><br>

  <!-- Semester -->

  <label>Preferred Semester</label>

  <select
      name="preferredSemester"
      required
      [(ngModel)]="preferredSemester">

      <option value="">Select</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

  </select>

  <br><br>

  <!-- Terms -->

  <input
      type="checkbox"
      name="agreeToTerms"
      required
      [(ngModel)]="agreeToTerms"
      #termsCtrl="ngModel">

  I agree to Terms

  <span *ngIf="termsCtrl.touched && termsCtrl.invalid">
      Accept Terms
  </span>

  <br><br>

  <button
      type="submit"
      [disabled]="enrollForm.invalid">

      Submit

  </button>

  <button
      type="button"
      (click)="enrollForm.resetForm()">

      Reset

  </button>

</form>

<div *ngIf="submitted">

    Enrollment request submitted successfully!

</div>
